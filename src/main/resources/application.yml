weather:
  api:
    key: ${WEATHER_API_KEY}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: journaldb
      auto-index-creation: true

    redis:
      host: certain-milkwood-plants-54157.db.redis.io
      port: 18734
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /journal






